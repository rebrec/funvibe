<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Éditeur de niveaux — jeuleo</title>
  <link rel="stylesheet" href="./editor.css" />
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <div class="tool-group">
        <span class="tool-label">Terrain</span>
        <button class="tool-btn active" data-tool="ground">Sol</button>
        <button class="tool-btn" data-tool="platform">Plateforme</button>
        <button class="tool-btn" data-tool="slope">Pente droite</button>
        <button class="tool-btn" data-tool="curve">Pente douce ⤴</button>
        <button class="tool-btn" data-tool="landmark">Repère</button>
      </div>
      <div class="tool-group">
        <span class="tool-label">Jeu</span>
        <button class="tool-btn" data-tool="start">🟢 Début</button>
        <button class="tool-btn" data-tool="finish">🏁 Arrivée</button>
        <button class="tool-btn" data-tool="select">↖ Sélection</button>
      </div>
      <div class="tool-group">
        <span class="tool-label">Entités</span>
        <button class="tool-btn" data-tool="enemy-walker">Ennemi walker</button>
        <button class="tool-btn" data-tool="enemy-charger">Ennemi charger</button>
        <button class="tool-btn" data-tool="coin">Pièce</button>
        <button class="tool-btn" data-tool="crystal">Cristal</button>
      </div>
      <div class="tool-group">
        <span class="tool-label">Monde</span>
        <label>Larg. : <input type="number" id="world-w" value="4000" min="500" step="100" /></label>
        <label>Haut. : <input type="number" id="world-h" value="2200" min="500" step="100" /></label>
      </div>
      <div class="tool-group">
        <span class="tool-label">Vue</span>
        <label>Grille : <input type="number" id="snap" value="20" min="1" max="200" /></label>
        <label>Zoom : <input type="range" id="zoom" min="0.1" max="2" step="0.05" value="0.5" /></label>
        <span id="zoom-label">50%</span>
      </div>
      <div class="tool-group">
        <button id="btn-new" class="action-btn">Nouveau</button>
        <button id="btn-import" class="action-btn">Importer .json</button>
        <button id="btn-save" class="action-btn primary">Sauvegarder</button>
        <button id="btn-export" class="action-btn">Exporter JSON</button>
      </div>
      <input type="file" id="file-input" accept="application/json,.json" style="display:none" />
    </div>

    <div id="main">
      <canvas id="canvas"></canvas>
      <div id="inspector">
        <h3>Propriétés</h3>
        <div id="inspector-content">
          <p class="hint">Sélectionnez un élément<br/>ou placez-en un.</p>
        </div>
        <h3>Niveaux sauvegardés</h3>
        <div id="level-list"></div>
        <h3>Aperçu JSON</h3>
        <textarea id="json-preview" readonly rows="12"></textarea>
      </div>
    </div>

    <div id="statusbar">
      <span id="status-tool">Outil : Sol</span>
      <span id="status-pos">x: 0  y: 0</span>
      <span id="status-count"></span>
    </div>
  </div>

  <script type="module" src="./editor.js"></script>
</body>
</html>
