<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>jeuleo — maquette M0</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1d2b3a;
        overflow: hidden;
      }
      #game {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Empêche la sélection / le zoom tactile pendant le jeu (utile pour le mobile). */
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
