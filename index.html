<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>jeuleo — maquette M0</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1d2b3a;
        overflow: hidden;
      }
      /* position:fixed garantit width/height = taille viewport sur Android Chrome,
         peu importe la hauteur calculée des ancêtres (évite le canvas à hauteur 0). */
      #game {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Empêche sélection / zoom tactile / highlight pendant le jeu. */
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
