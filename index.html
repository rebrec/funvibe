<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>jeuleo</title>
    <style>
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        background: #5fb6e6;
        overflow: hidden;
      }
      #game {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #5fb6e6;
      }

      /* ── Écran de démarrage mobile ─────────────────────────────────────── */
      #play-overlay {
        position: fixed;
        inset: 0; z-index: 9999;
        background: linear-gradient(160deg, #1a2e4a 0%, #0d1b2a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        color: #fff;
        font-family: monospace;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
        /* Masqué sur desktop (pas de touch), visible sur mobile via JS */
        display: none;
      }
      #play-overlay .title {
        font-size: 36px;
        font-weight: bold;
        letter-spacing: 3px;
        color: #ffe066;
        text-shadow: 0 2px 8px #0005;
      }
      #play-overlay .subtitle {
        font-size: 14px;
        color: #aaccee;
        margin-top: -12px;
      }
      #play-btn {
        margin-top: 12px;
        padding: 18px 48px;
        font-size: 22px;
        font-family: monospace;
        font-weight: bold;
        background: #ffe066;
        color: #1a2e4a;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        box-shadow: 0 4px 20px #0006;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      #play-btn:active { transform: scale(0.96); }
      #play-overlay .hint {
        font-size: 13px;
        color: #6688aa;
        line-height: 1.6;
      }
      #play-overlay .icons { font-size: 48px; }

      /* ── Hint « tourne l'écran » ───────────────────────────────────────────
         N'apparaît qu'APRÈS avoir tapé JOUER (body.started) ET seulement si le
         téléphone est encore en portrait (verrou paysage non appliqué). Dès que
         l'appareil passe en paysage, la media query le masque automatiquement. */
      #rotate-hint {
        display: none;
        position: fixed; inset: 0; z-index: 9000;
        background: #0d1b2a;
        color: #fff; font-family: monospace; text-align: center;
        flex-direction: column; align-items: center; justify-content: center; gap: 18px;
        padding: 24px; box-sizing: border-box;
      }
      #rotate-hint .icon { font-size: 64px; animation: rot 1.6s ease-in-out infinite; }
      #rotate-hint p { font-size: 20px; line-height: 1.5; margin: 0; }
      @keyframes rot { 0%,100% { transform: rotate(0); } 50% { transform: rotate(90deg); } }
      @media (orientation: portrait) {
        body.started #rotate-hint { display: flex; }
      }

      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }
      /* Rétablir touch-action sur le bouton pour qu'il soit cliquable */
      #play-btn { touch-action: manipulation; }
    </style>
  </head>
  <body>
    <div id="game"></div>

    <!-- Hint de secours si le verrou paysage n'a pas pu s'appliquer. -->
    <div id="rotate-hint" aria-hidden="true">
      <div class="icon">📱</div>
      <p>Tourne ton téléphone<br>en <strong>mode paysage</strong> 🎮</p>
    </div>

    <div id="play-overlay">
      <div class="icons">🥷⚔️</div>
      <div class="title">JEULEO</div>
      <div class="subtitle">aventure &amp; plateforme</div>
      <button id="play-btn" onclick="startGame()">▶ JOUER</button>
      <p class="hint">
        Pour la meilleure expérience :<br>
        tourne ton téléphone en paysage 🔄
      </p>
    </div>

    <script>
      // N'affiche l'overlay que sur mobile (évite une popup inutile sur desktop).
      const isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(navigator.userAgent)
                    || (/macintosh/i.test(navigator.userAgent) && 'ontouchstart' in window);
      if (isMobile) {
        document.getElementById('play-overlay').style.display = 'flex';
      }

      async function startGame() {
        const el = document.documentElement;

        // 1. PLEIN ÉCRAN d'abord, et on ATTEND qu'il soit effectif.
        //    Crucial : sur Android Chrome, screen.orientation.lock() n'est
        //    autorisé QUE si le document est déjà en plein écran. Sans ce await,
        //    le lock échouait silencieusement → le tél restait en portrait →
        //    le jeu 16:9 se réduisait à une bande (énormes bandes bleues).
        try {
          const fsReq = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
          if (fsReq) await fsReq.call(el);
        } catch { /* refusé : on continue, le hint portrait prendra le relais */ }

        // 2. Verrouiller en PAYSAGE (maintenant qu'on est en plein écran).
        try {
          if (screen.orientation?.lock) await screen.orientation.lock('landscape');
        } catch { /* non supporté : le hint « tourne l'écran » s'affichera */ }

        // 3. Masquer l'overlay une fois les tentatives faites.
        document.getElementById('play-overlay').style.display = 'none';
        document.body.classList.add('started'); // active le hint portrait si besoin

        // 4. Forcer Phaser à recalculer la taille après le changement de viewport.
        setTimeout(() => window.__game?.scale?.refresh(), 150);
      }

      // Sur desktop : tentative de verrou au chargement (sans tap requis)
      if (!isMobile && screen.orientation?.lock) {
        screen.orientation.lock('landscape').catch(() => {});
      }
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
